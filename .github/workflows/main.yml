name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            openjdk-17-jdk \
            zip \
            unzip \
            git

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # Обновлённые версии для совместимости
          pip install buildozer==1.5.0 cython==3.0.11 setuptools==69.0.0

      - name: Setup Android SDK licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-preview-license

      - name: Install Android SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
            "platforms;android-33" \
            "build-tools;33.0.0" \
            "platform-tools" \
            "ndk;25.2.9519653"

      - name: Create APK output directory
        run: mkdir -p apk_output

      - name: Build APK
        run: |
          set -o pipefail
          # Очищаем кэш перед сборкой (избегаем конфликтов версий)
          rm -rf .buildozer/android/platform/build-arm64-v8a/.gradle
          
          buildozer -v android debug 2>&1 | tee build.log
          
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ BUILD FAILED — tail of log:"
            tail -n 150 build.log
            exit 1
          fi
          
          # Поиск APK
          APK_PATH=$(find .buildozer/android/platform/build-arm64-v8a/dists/mykivyapp/build/outputs/apk -name "*-debug.apk" -type f 2>/dev/null | head -n1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" apk_output/mykivyapp-debug.apk
            echo "✓ APK copied: $APK_PATH"
          else
            echo "⚠ Searching alternative paths..."
            find .buildozer -name "*.apk" -type f -exec cp {} apk_output/ \; 2>/dev/null || true
            if [ -z "$(ls -A apk_output/ 2>/dev/null)" ]; then
              echo "❌ No APK found after build"
              exit 1
            fi
          fi
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
          GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.daemon=false"

      - name: Upload APK artifact        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mykivyapp-apk
          path: apk_output/*.apk
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            .buildozer/android/platform/build-arm64-v8a/dist_info.txt
          retention-days: 7