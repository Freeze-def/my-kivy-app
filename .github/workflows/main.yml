name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install buildozer cython==0.29.33 setuptools==65.5.0

      - name: Build APK
        run: |
          # Инициализируем buildozer (если нет spec, но мы его создали вручную)
          # Запускаем сборку. 
          # ВАЖНО: Мы используем флаг --verbose, чтобы видеть ошибки, если они будут
          buildozer android debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
