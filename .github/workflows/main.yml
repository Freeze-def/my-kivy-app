name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            libffi-dev \
            libssl-dev \
            autoconf \
            automake \
            libtool \
            pkg-config \
            openjdk-17-jdk \
            zip \
            unzip \
            git \
            wget

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==3.0.11 setuptools==69.0.0

      # 🔥 КЭШ: Сохраняем скачанные пакеты и скомпилированные рецепты
      - name: Cache Buildozer artifacts
        uses: actions/cache@v4        with:
          path: |
            ~/.buildozer/android/packages
            .buildozer/android/platform/build-arm64-v8a/build
            .buildozer/android/platform/build-arm64-v8a/.gradle
            .buildozer/android/platform/build-arm64-v8a/dists
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-v1
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Setup Android SDK licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license

      - name: Install Android SDK components (skip if exists)
        run: |
          if [ ! -d "$ANDROID_HOME/platforms/android-33" ]; then
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
              "platforms;android-33" \
              "build-tools;33.0.0" \
              "platform-tools" \
              "ndk;25.2.9519653"
          else
            echo "✅ SDK/NDK already installed, skipping download"
          fi

      - name: Create APK output directory
        run: mkdir -p apk_output

      - name: Build APK
        id: build_step
        run: |
          set -o pipefail
          
          echo "🔨 Starting INCREMENTAL build..."
          buildozer -v android debug 2>&1 | tee build.log
          
          BUILD_STATUS=${PIPESTATUS[0]}
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Build failed with exit code $BUILD_STATUS"
            tail -n 200 build.log
            exit 1
          fi
          
          echo "✅ Build completed. Searching for APK..."
          
          # === ПОИСК 1: Стандартный путь ===
          find .buildozer/android/platform/build-arm64-v8a/dists/mykivyapp/build/outputs/apk -type f -name "*.apk" 2>/dev/null | while read apk; do            echo "  Found: $apk"
            cp -v "$apk" apk_output/
          done
          
          # === ПОИСК 2: Альтернативный путь ===
          find .buildozer -type f -name "mykivyapp*.apk" 2>/dev/null | while read apk; do
            echo "  Found: $apk"
            cp -v "$apk" apk_output/
          done
          
          # === ПОИСК 3: Любой APK ===
          find .buildozer -type f -name "*.apk" 2>/dev/null | grep -v "unaligned\|unsigned" | while read apk; do
            echo "  Found: $apk"
            cp -v "$apk" apk_output/
          done
          
          # === ФИНАЛЬНАЯ ПРОВЕРКА ===
          APK_COUNT=$(find apk_output -name "*.apk" -type f 2>/dev/null | wc -l)
          if [ "$APK_COUNT" -eq 0 ]; then
            echo "❌ CRITICAL: No APK files found"
            find .buildozer -name "*.apk" -type f 2>/dev/null || echo "  None"
            exit 1
          fi
          
          echo "✅ Successfully copied $APK_COUNT APK file(s)"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
          LC_ALL: C.UTF-8
          LANG: C.UTF-8
          GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.daemon=false"

      - name: Debug: List build outputs
        if: always()
        run: |
          echo "📁 Dist structure:"
          find .buildozer/android/platform/build-arm64-v8a/dists/mykivyapp -maxdepth 3 -type d 2>/dev/null | head -10 || echo "  (not found)"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mykivyapp-apk
          path: apk_output/*.apk
          retention-days: 30
          compression-level: 6
          if-no-files-found: warn

      - name: Upload build logs
        if: always()        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            .buildozer/android/platform/build-arm64-v8a/dist_info.txt
          retention-days: 7